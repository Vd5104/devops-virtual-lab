apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops

  template:
    metadata:
      labels:
        app: devops

    spec:
      containers:
      - name: devops-container
        image: vd5104/devops-lab-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80